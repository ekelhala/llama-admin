name: pages

# Publishes the Hugo site in /landing to GitHub Pages.
# Source lives in landing/ (content/, layouts/, assets/); the rendered output is
# committed to landing/public/ so no build step is required at deploy time.
# Rebuild locally with: make landing
#
# Repo setting required (Settings -> Pages -> Build and deployment -> Source):
#   "GitHub Actions"
#
# The page will be live at:
#   https://ekelhala.github.io/llama-admin/

on:
  push:
    branches: [main]
    paths:
      - "landing/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
