name: release

# Builds the llama-admin server and CLI binaries for linux/amd64 and
# linux/arm64 on every push to main, then publishes them as a rolling
# "latest" prerelease. This gives stable download URLs that always point
# at the most recent main build:
#
#   https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-server-amd64
#   https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-server-arm64
#   https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-amd64
#   https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-arm64
#
# Build strategy per architecture:
#
#   server  CGO_ENABLED=1  — mattn/go-sqlite3 needs cgo to register the
#                            "sqlite3" driver. Cross-compiled against glibc
#                            (amd64) / aarch64 glibc (arm64) using the
#                            system C compiler and gcc-aarch64-linux-gnu
#                            respectively. These binaries run on glibc Linux
#                            hosts (workstations, RPi, Graviton, Ampere).
#                            They will NOT run inside Termux (Android/bionic).
#
#   CLI     CGO_ENABLED=0  — the CLI has no sqlite dependency, so it builds
#                            as a fully static binary that runs anywhere,
#                            including Termux on Android phones.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: ""
          - arch: arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        env:
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"

          mkdir -p dist

          # Server: cgo required for sqlite. CC picks the right cross-compiler
          # for arm64 (empty for amd64 = system gcc).
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 CC="$CC" \
            go build -trimpath -ldflags "${LDFLAGS}" -o dist/llama-admin-server-${{ matrix.arch }} ./cmd/server

          # CLI: static, no cgo. Runs on glibc Linux and inside Termux.
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags "${LDFLAGS}" -o dist/llama-admin-${{ matrix.arch }} ./cmd/llama-admin

          file dist/llama-admin-server-${{ matrix.arch }} dist/llama-admin-${{ matrix.arch }}

      - name: Stage release assets
        # These shared (arch-independent) assets only need to be uploaded
        # once, so do it from the amd64 leg.
        if: matrix.arch == 'amd64'
        run: |
          cp deploy/install-server.sh    dist/install-server.sh
          cp deploy/install-cli.sh       dist/install-cli.sh
          cp config.example.yaml         dist/config.example.yaml
          cp deploy/llama-admin.service  dist/llama-admin.service

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  publish:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish rolling latest prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          gh release create latest \
            --target "$GITHUB_SHA" \
            --title "Latest (main)" \
            --notes "Automated build of main @ $(git rev-parse --short HEAD).

          These binaries are rebuilt on every push to \`main\` and replace the
          previous build under the same URL. Treat them as development builds.

          Prebuilt assets for **linux/amd64** and **linux/arm64** are
          published. The install scripts pick the right one based on
          \`uname -m\`.

          Install the server (binaries + config + systemd unit):

              curl -fsSL https://github.com/ekelhala/llama-admin/releases/download/latest/install-server.sh | sh

          Install just the CLI on your workstation (or in Termux on Android):

              curl -fsSL https://github.com/ekelhala/llama-admin/releases/download/latest/install-cli.sh | sh

          or grab a binary directly:

              curl -fsSL -o llama-admin-server https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-server-amd64
              curl -fsSL -o llama-admin        https://github.com/ekelhala/llama-admin/releases/download/latest/llama-admin-amd64
          " \
            --prerelease \
            dist/*
